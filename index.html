<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot-It Universe</title>
    <!-- Firebase SDK Compat (Realtime Database) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #05050a;
            --panel-bg: #10101f;
            --neon-pink: #ff007f;
            --neon-cyan: #00f0ff;
            --neon-purple: #9d00ff;
            --text-main: #f0f0f5;
            --text-muted: #8888aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            text-align: center;
            padding: 10px 0;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--neon-pink);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .user-box {
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        .user-box label {
            font-size: 0.85rem;
            color: var(--neon-cyan);
            font-weight: bold;
        }

        .user-box input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            width: 100%;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--text-muted);
            background: var(--panel-bg);
            color: var(--text-muted);
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tab-btn.active {
            border-color: var(--neon-pink);
            color: var(--text-main);
            background: linear-gradient(135deg, rgba(255,0,127,0.2), rgba(157,0,255,0.2));
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.3);
        }

        .section-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .section-panel.active {
            display: flex;
        }

        textarea {
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--text-muted);
            border-radius: 10px;
            padding: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--neon-cyan);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,0,127,0.4);
            transition: transform 0.1s, opacity 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 4px;
        }

        .post-card {
            background: rgba(20, 20, 35, 0.7);
            border-left: 3px solid var(--neon-pink);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeIn 0.4s ease;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--neon-cyan);
        }

        .post-body {
            font-size: 0.9rem;
            word-break: break-word;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .room-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-item:hover {
            border-color: var(--neon-cyan);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>SPOT-IT UNIVERSE</h1>
            <div class="subtitle">GLOBAL LIVE STREAM & CONNECTION</div>
        </header>

        <div class="user-box">
            <label>NAME:</label>
            <input type="text" id="userName" placeholder="Your name or alias...">
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('flow')">🔥 FLOW</button>
            <button class="tab-btn" onclick="switchTab('rooms')">🗣️ ROOMS</button>
            <button class="tab-btn" onclick="switchTab('direct')">💬 DIRECT</button>
        </div>

        <!-- FLOW SECTION -->
        <div id="panel-flow" class="section-panel active">
            <div style="font-size: 0.85rem; color: var(--text-muted);">Share your thoughts, life pills, or reflections with the world.</div>
            <textarea id="flowInput" placeholder="Express your thoughts for the road..."></textarea>
            <button class="action-btn" onclick="publishFlow()">PUBLISH 🚀</button>
            <div class="feed" id="flowFeed"></div>
        </div>

        <!-- ROOMS SECTION -->
        <div id="panel-rooms" class="section-panel">
            <div style="font-size: 0.85rem; color: var(--text-muted);">Deep thematic rooms for shared growth.</div>
            <div class="rooms-list" id="roomsList">
                <div class="room-item" onclick="enterRoom('ADHD & Growth')">
                    <span>🧠 ADHD & Growth</span>
                    <span style="font-size:0.75rem; color:var(--neon-cyan);">Enter</span>
                </div>
                <div class="room-item" onclick="enterRoom('Investments & Future')">
                    <span>📈 Investments & Future</span>
                    <span style="font-size:0.75rem; color:var(--neon-cyan);">Enter</span>
                </div>
                <div class="room-item" onclick="enterRoom('Life for Others')">
                    <span>💡 Life for Others</span>
                    <span style="font-size:0.75rem; color:var(--neon-cyan);">Enter</span>
                </div>
            </div>
            <div id="roomChatView" style="display:none; flex-direction:column; gap:10px;">
                <button class="tab-btn" style="width:fit-content;" onclick="leaveRoom()">⬅ Back to Rooms</button>
                <h3 id="activeRoomTitle" style="color:var(--neon-cyan); font-size:1rem;"></h3>
                <textarea id="roomInput" placeholder="Write in the room..."></textarea>
                <button class="action-btn" onclick="publishRoomMessage()">SEND TO CHANNEL</button>
                <div class="feed" id="roomFeed"></div>
            </div>
        </div>

        <!-- DIRECT SECTION -->
        <div id="panel-direct" class="section-panel">
            <div style="font-size: 0.85rem; color: var(--text-muted);">Private and direct channel space.</div>
            <textarea id="directInput" placeholder="Write a direct message..."></textarea>
            <button class="action-btn" onclick="publishDirect()">SEND MESSAGE</button>
            <div class="feed" id="directFeed"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://spot-it-universo-default-rtdb.firebaseio.com/"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const nameInput = document.getElementById('userName');
        nameInput.value = localStorage.getItem('spot_it_user') || 'Wayfarer';
        nameInput.addEventListener('input', () => {
            localStorage.setItem('spot_it_user', nameInput.value);
        });

        function getUserName() {
            return nameInput.value.trim() || 'Wayfarer';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
            
            if(tabName === 'flow') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('panel-flow').classList.add('active');
            } else if(tabName === 'rooms') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('panel-rooms').classList.add('active');
            } else if(tabName === 'direct') {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                document.getElementById('panel-direct').classList.add('active');
            }
        }

        function publishFlow() {
            const text = document.getElementById('flowInput').value.trim();
            if(!text) return;
            
            const postData = {
                author: getUserName(),
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            db.ref('flowPosts').push(postData);
            document.getElementById('flowInput').value = '';
        }

        db.ref('flowPosts').on('value', (snapshot) => {
            const feed = document.getElementById('flowFeed');
            feed.innerHTML = '';
            const data = snapshot.val();
            if(data) {
                Object.values(data).reverse().forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-header"><span>${escapeHtml(post.author)}</span><span>${post.time}</span></div>
                        <div class="post-body">${escapeHtml(post.text)}</div>
                    `;
                    feed.appendChild(card);
                });
            }
        });

        let currentRoomName = '';
        function enterRoom(roomName) {
            currentRoomName = roomName;
            document.getElementById('roomsList').style.display = 'none';
            const chatView = document.getElementById('roomChatView');
            chatView.style.display = 'flex';
            document.getElementById('activeRoomTitle').innerText = 'Room: ' + roomName;
            loadRoomMessages();
        }

        function leaveRoom() {
            currentRoomName = '';
            document.getElementById('roomsList').style.display = 'flex';
            document.getElementById('roomChatView').style.display = 'none';
        }

        function publishRoomMessage() {
            const text = document.getElementById('roomInput').value.trim();
            if(!text || !currentRoomName) return;

            const roomKey = currentRoomName.replace(/[^a-zA-Z0-9]/g, '_');
            const postData = {
                author: getUserName(),
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            db.ref('rooms/' + roomKey).push(postData);
            document.getElementById('roomInput').value = '';
        }

        function loadRoomMessages() {
            if(!currentRoomName) return;
            const roomKey = currentRoomName.replace(/[^a-zA-Z0-9]/g, '_');
            
            db.ref('rooms/' + roomKey).on('value', (snapshot) => {
                const feed = document.getElementById('roomFeed');
                feed.innerHTML = '';
                const data = snapshot.val();
                if(data) {
                    Object.values(data).reverse().forEach(post => {
                        const card = document.createElement('div');
                        card.className = 'post-card';
                        card.innerHTML = `
                            <div class="post-header"><span>${escapeHtml(post.author)}</span><span>${post.time}</span></div>
                            <div class="post-body">${escapeHtml(post.text)}</div>
                        `;
                        feed.appendChild(card);
                    });
                }
            });
        }

        function publishDirect() {
            const text = document.getElementById('directInput').value.trim();
            if(!text) return;

            const postData = {
                author: getUserName(),
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            db.ref('directMessages').push(postData);
            document.getElementById('directInput').value = '';
        }

        db.ref('directMessages').on('value', (snapshot) => {
            const feed = document.getElementById('directFeed');
            feed.innerHTML = '';
            const data = snapshot.val();
            if(data) {
                Object.values(data).reverse().forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-header"><span>${escapeHtml(post.author)}</span><span>${post.time}</span></div>
                        <div class="post-body">${escapeHtml(post.text)}</div>
                    `;
                    feed.appendChild(card);
                });
            }
        });

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
