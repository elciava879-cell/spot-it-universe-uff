<!DOCTYPE html>
<html lang="it" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spot-it. Universe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0f0a1a; color: #fff; padding: 15px; max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        h1 { font-size: 19px; color: #fce7f3; }
        .subtitle { font-size: 10px; color: #38bdf8; font-weight: bold; }
        .card { background: #181032; border: 1px solid #6d28d9; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
        .nav-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
        .tab-btn { background: #3b0764; border: 1px solid #7c3aed; color: #fbcfe8; padding: 8px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; white-space: nowrap; font-weight: 600; }
        .tab-btn.active { background: linear-gradient(135deg, #0284c7, #9333ea); color: #fff; border-color: #38bdf8; }
        .section-content { display: none; flex-direction: column; gap: 10px; }
        .section-content.active { display: flex; }
        textarea { width: 100%; background: #0f0a1a; border: 1px solid #7c3aed; color: #fff; border-radius: 8px; padding: 10px; font-size: 13px; resize: none; height: 75px; outline: none; }
        button.action-btn { width: 100%; background: linear-gradient(135deg, #0284c7, #9333ea); border: none; color: #fff; padding: 11px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .msg-list { margin-top: 10px; max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg-item { background: #23174a; padding: 10px; border-radius: 8px; font-size: 13px; border-left: 3px solid #38bdf8; }
        .msg-header { font-size: 10px; color: #38bdf8; font-weight: bold; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .msg-time { font-size: 9px; color: #9ca3af; }
        .user-setup { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
        .user-setup input { width: 100%; background: #0f0a1a; border: 1px solid #7c3aed; color: #38bdf8; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Spot-it. Universe</h1>
            <div class="subtitle">STREET FLOW & ROOMS</div>
        </div>
    </header>

    <div class="user-setup">
        <span style="font-size: 11px; color: #cbd5e1; white-space: nowrap;">Nome:</span>
        <input type="text" id="usernameInput" value="StreetExplorer" oninput="salvaUsername()">
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="cambiaTab('flusso', this)">🔥 Il Flusso</button>
        <button class="tab-btn" onclick="cambiaTab('rooms', this)">🗣️ Room Opinioni</button>
        <button class="tab-btn" onclick="cambiaTab('direct', this)">💬 Direct Style</button>
    </div>

    <div id="flusso" class="section-content active">
        <div class="card">
            <h3 style="font-size: 14px; margin-bottom: 6px;">Condividi nel Flusso</h3>
            <textarea id="inputFlusso" placeholder="Scrivi un pensiero..."></textarea>
            <button class="action-btn" onclick="inviaMessaggio('flusso')">PUBBLICA 🚀</button>
            <div class="msg-list" id="listFlusso"></div>
        </div>
    </div>

    <div id="rooms" class="section-content">
        <div class="card">
            <h3 style="font-size: 14px; margin-bottom: 6px;">🗣️ Room di Scambio</h3>
            <textarea id="inputRooms" placeholder="Apri un dibattito..."></textarea>
            <button class="action-btn" onclick="inviaMessaggio('rooms')">INVIA 🎙️</button>
            <div class="msg-list" id="listRooms"></div>
        </div>
    </div>

    <div id="direct" class="section-content">
        <div class="card">
            <h3 style="font-size: 14px; margin-bottom: 6px;">💬 Direct Style</h3>
            <textarea id="inputDirect" placeholder="Scrivi un messaggio..."></textarea>
            <button class="action-btn" onclick="inviaMessaggio('direct')">INVIA 💌</button>
            <div class="msg-list" id="listDirect"></div>
        </div>
    </div>

    <script>
        function salvaUsername() {
            localStorage.setItem('spot_username', document.getElementById('usernameInput').value);
        }
        if(localStorage.getItem('spot_username')) {
            document.getElementById('usernameInput').value = localStorage.getItem('spot_username');
        }

        function cambiaTab(tabId, btn) {
            document.querySelectorAll('.section-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function caricaMessaggi() {
            ['flusso', 'rooms', 'direct'].forEach(sezione => {
                const dati = JSON.parse(localStorage.getItem('spot_data_' + sezione) || '[]');
                const listEl = document.getElementById('list' + sezione.charAt(0).toUpperCase() + sezione.slice(1));
                if (dati.length === 0) {
                    listEl.innerHTML = '<div class="msg-item"><div class="msg-header"><span>System</span></div><div style="color:#f3f4f6;">Nessun messaggio. Scrivi il primo!</div></div>';
                    return;
                }
                listEl.innerHTML = dati.map(m => `
                    <div class="msg-item">
                        <div class="msg-header"><span>${m.autore}</span><span class="msg-time">${m.ora}</span></div>
                        <div style="color:#f3f4f6; word-break:break-word;">${m.testo}</div>
                    </div>
                `).join('');
            });
        }

        function inviaMessaggio(sezione) {
            const inputEl = document.getElementById('input' + sezione.charAt(0).toUpperCase() + sezione.slice(1));
            const testo = inputEl.value.trim();
            if (!testo) return;
            const autore = document.getElementById('usernameInput').value || 'Anonymous';
            const ora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let dati = JSON.parse(localStorage.getItem('spot_data_' + sezione) || '[]');
            dati.unshift({ autore, testo, ora });
            localStorage.setItem('spot_data_' + sezione, JSON.stringify(dati));
            inputEl.value = '';
            caricaMessaggi();
        }

        window.onload = caricaMessaggi;
    </script>
</body>
</html>
