<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spot-it. Universe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #08040f; color: #fff; padding: 12px; max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { font-size: 18px; color: #ff007f; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase; }
        .subtitle { font-size: 9px; color: #00f0ff; font-weight: bold; letter-spacing: 1px; }
        .card { background: #130a24; border: 1px solid #ff007f; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255,0,127,0.15); }
        .nav-tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 4px; }
        .tab-btn { background: #1f0c3d; border: 1px solid #00f0ff; color: #00f0ff; padding: 8px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; white-space: nowrap; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { background: #ff007f; color: #fff; border-color: #ff007f; box-shadow: 0 0 10px rgba(255,0,127,0.5); }
        .section-content { display: none; flex-direction: column; gap: 8px; }
        .section-content.active { display: flex; }
        textarea { width: 100%; background: #08040f; border: 1px solid #00f0ff; color: #fff; border-radius: 8px; padding: 10px; font-size: 13px; resize: none; height: 70px; outline: none; }
        button.action-btn { width: 100%; background: linear-gradient(135deg, #ff007f, #7928ca); border: none; color: #fff; padding: 11px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .msg-list { margin-top: 8px; max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .msg-item { background: #1a0e35; padding: 10px; border-radius: 8px; font-size: 13px; border-left: 3px solid #ff007f; }
        .msg-header { font-size: 10px; color: #00f0ff; font-weight: bold; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .msg-time { font-size: 9px; color: #8a7c9f; }
        .user-setup { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; background: #130a24; padding: 8px 10px; border-radius: 8px; border: 1px solid #7928ca; }
        .user-setup input { width: 100%; background: transparent; border: none; color: #00f0ff; font-size: 12px; font-weight: bold; outline: none; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Spot-it Universe</h1>
            <div class="subtitle">STREET FLOW & ROOMS</div>
        </div>
    </header>

    <div class="user-setup">
        <span style="font-size: 11px; color: #fff; font-weight: bold;">NOME:</span>
        <input type="text" id="usernameInput" value="StreetKing" oninput="salvaUsername()">
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="cambiaTab('flusso', this)">🔥 Il Flusso</button>
        <button class="tab-btn" onclick="cambiaTab('rooms', this)">🗣️ Room</button>
        <button class="tab-btn" onclick="cambiaTab('direct', this)">💬 Direct</button>
    </div>

    <div id="flusso" class="section-content active">
        <div class="card">
            <h3 style="font-size: 13px; margin-bottom: 6px; color: #00f0ff;">Scrivi nel Flusso</h3>
            <textarea id="inputFlusso" placeholder="Lancia il tuo pensiero sulla strada..."></textarea>
            <button class="action-btn" onclick="inviaMessaggio('flusso')">PUBBLICA 🚀</button>
            <div class="msg-list" id="listFlusso"></div>
        </div>
    </div>

    <div id="rooms" class="section-content">
        <div class="card">
            <h3 style="font-size: 13px; margin-bottom: 6px; color: #00f0ff;">Room di Scambio</h3>
            <textarea id="inputRooms" placeholder="Apri il dibattito vero..."></textarea>
            <button class="action-btn" onclick="inviaMessaggio('rooms')">INVIA 🎙️</button>
            <div class="msg-list" id="listRooms"></div>
        </div>
    </div>

    <div id="direct" class="section-content">
        <div class="card">
            <h3 style="font-size: 13px; margin-bottom: 6px; color: #00f0ff;">Direct Style</h3>
            <textarea id="inputDirect" placeholder="Manda il messaggio diretto..."></textarea>
            <button class="action-btn" onclick="inviaMessaggio('direct')">INVIA 💌</button>
            <div class="msg-list" id="listDirect"></div>
        </div>
    </div>

    <script>
        function salvaUsername() {
            localStorage.setItem('spot_username', document.getElementById('usernameInput').value);
        }
        if(localStorage.getItem('spot_username')) {
            document.getElementById('usernameInput').value = localStorage.getItem('spot_username');
        }

        function cambiaTab(tabId, btn) {
            document.querySelectorAll('.section-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function caricaMessaggi() {
            ['flusso', 'rooms', 'direct'].forEach(sezione => {
                const dati = JSON.parse(localStorage.getItem('spot_data_' + sezione) || '[]');
                const listEl = document.getElementById('list' + sezione.charAt(0).toUpperCase() + sezione.slice(1));
                if (dati.length === 0) {
                    listEl.innerHTML = '<div class="msg-item"><div class="msg-header"><span>SYSTEM</span></div><div style="color:#a89bc9;">Ancora niente qui. Scrivi tu il primo pezzo!</div></div>';
                    return;
                }
                listEl.innerHTML = dati.map(m => `
                    <div class="msg-item">
                        <div class="msg-header"><span>${m.autore}</span><span class="msg-time">${m.ora}</span></div>
                        <div style="color:#fff; word-break:break-word;">${m.testo}</div>
                    </div>
                `).join('');
            });
        }

        function inviaMessaggio(sezione) {
            const inputEl = document.getElementById('input' + sezione.charAt(0).toUpperCase() + sezione.slice(1));
            const testo = inputEl.value.trim();
            if (!testo) return;
            const autore = document.getElementById('usernameInput').value || 'Anonymous';
            const ora = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let dati = JSON.parse(localStorage.getItem('spot_data_' + sezione) || '[]');
            dati.unshift({ autore, testo, ora });
            localStorage.setItem('spot_data_' + sezione, JSON.stringify(dati));
            inputEl.value = '';
            caricaMessaggi();
        }

        window.onload = caricaMessaggi;
    </script>
</body>
</html>
